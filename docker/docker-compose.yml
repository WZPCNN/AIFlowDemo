# docker/docker-compose.yml
# 定义开发环境所需要的数据库服务
services:
  # PostgreSQL 关系型数据库
  postgres:
    image: postgres:19beta1-trixie
    container_name: aiflow-postgresql
    ports:
      - '5432:5432' # 主机5433端口映射到容器5432端口
    environment:
      - POSTGRES_DB=aiflow # 默认数据库名称
      - POSTGRES_USER=postgres # 数据库用户名
      - POSTGRES_PASSWORD=demo666 # 数据库密码
    volumes:
      - ./postgres_data:/var/lib/postgresql # 数据持久化
    # 日志控制，防止服务器日志文件爆满
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiflow-qdrant
    ports:
      - '6333:6333' # Qdrant REST API 端口
    volumes:
      - ./qdrant_data:/qdrant/storage # 数据持久化
    # 日志控制
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'
  
# 定义 Docker 网络配置
networks:
  # 使用默认网络，所有服务自动加入此网络
  default:
    # 网络名称，便于在 Docker 中识别
    name: aiflow-network
    # 使用 bridge 桥接模式，容器间可通过网络名称互相通信
    driver: bridge